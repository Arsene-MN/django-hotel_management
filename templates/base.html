{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hostel Management System{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <header>
        <h1>Hostel Management System</h1>
        <nav>
            <ul>
      {% if user.is_authenticated %}
      <a href="{% url 'logout' %}">Logout</a>
  {% else %}
      <a href="{% url 'login' %}">Login</a>
  {% endif %}
                <li><a href="{% url 'booking_list' %}">Bookings</a></li>
                <li><a href="{% url 'rooms:room_list' %}">Rooms</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}
        <!-- Content specific to the page will go here -->
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2024 Hostel Management System</p>
    </footer>
</body>
</html>
