{% extends 'base.html' %}

{% block content %}
  <h2>Are you sure you want to delete {{ guest.first_name }} {{ guest.last_name }}?</h2>
  <form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
    <a href="{% url 'guest_list' %}">Cancel</a>
  </form>
{% endblock %}
