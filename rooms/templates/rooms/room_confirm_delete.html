<!DOCTYPE html>
<html>
<head>
    <title>Delete Room</title>
</head>
<body>
    <h1>Delete Room</h1>
    <p>Are you sure you want to delete Room {{ room.room_number }}?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Confirm</button>
    </form>
    <a href="{% url 'room_list' %}">Cancel</a>
</body>
</html>
